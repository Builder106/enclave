<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="Enclave — clinical document AI that never phones home">
  <rect width="1200" height="420" fill="#eef1f5"/>
  <rect x="0" y="0" width="1200" height="4" fill="#15825a"/>

  <!-- mark: corner brackets sealing a core -->
  <g transform="translate(98 150) scale(1.62)" fill="none">
    <g stroke="#15825a" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 19V14a6 6 0 0 1 6-6h5"/>
      <path d="M45 8h5a6 6 0 0 1 6 6v5"/>
      <path d="M56 45v5a6 6 0 0 1-6 6h-5"/>
      <path d="M19 56h-5a6 6 0 0 1-6-6v-5"/>
    </g>
    <rect x="24" y="24" width="16" height="16" rx="4.5" fill="#15825a"/>
  </g>

  <text x="232" y="198" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="80" font-weight="700" letter-spacing="-1.5" fill="#141a21">Enclave</text>
  <text x="235" y="248" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-size="28" fill="#5c6873">Clinical document AI that <tspan fill="#15825a" font-weight="600">never phones home</tspan>.</text>
  <text x="235" y="302" font-family="ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace" font-size="18" letter-spacing="3.5" fill="#8a96a3">LOAD&#160;·&#160;EXTRACT&#160;·&#160;SEE WHAT LEAVES THE MACHINE</text>

  <!-- thesis chip -->
  <g transform="translate(905 176)">
    <rect x="0" y="0" width="202" height="68" rx="8" fill="#ffffff" stroke="#15825a" stroke-opacity="0.4"/>
    <circle cx="24" cy="25" r="4" fill="#15825a"/>
    <text x="38" y="30" font-family="ui-monospace,'SFMono-Regular',Menlo,monospace" font-size="13" letter-spacing="2" fill="#15825a">ON-DEVICE</text>
    <text x="24" y="55" font-family="ui-monospace,'SFMono-Regular',Menlo,monospace" font-size="21" font-weight="700" fill="#141a21">0 B egress</text>
  </g>
