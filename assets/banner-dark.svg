<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="Enclave — Clinical document AI that never phones home">
  <rect width="1200" height="420" fill="#0B0F14"/>

  <!-- vault mark -->
  <g transform="translate(84 132) scale(2.3)">
    <rect x="7" y="7" width="50" height="50" rx="14" fill="none" stroke="#4FD1A5" stroke-width="4.5"/>
    <path d="M23 18h11l8 8v19H23Z" fill="none" stroke="#8B98A5" stroke-width="3" stroke-linejoin="round"/>
    <path d="M34 18v8h8" fill="none" stroke="#8B98A5" stroke-width="3" stroke-linejoin="round"/>
    <path d="M27.5 33h10M27.5 39h6.5" stroke="#4FD1A5" stroke-width="3" stroke-linecap="round"/>
