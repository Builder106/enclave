    <rect x="44.5" y="50" width="13" height="10" rx="2.5" fill="#4FD1A5"/>
  </g>

  <!-- wordmark + tagline -->
  <text x="272" y="208" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="88" font-weight="700" letter-spacing="-2" fill="#E6EDF3">Enclave</text>
  <text x="276" y="252" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" fill="#9FB0BF">Clinical document AI that <tspan fill="#4FD1A5">never phones home</tspan>.</text>
  <text x="276" y="284" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="22" fill="#9FB0BF">Local agentic extraction, measured against the cloud.</text>

  <!-- provider columns: local wins on privacy -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12.5" letter-spacing="2.5" text-anchor="middle">
    <rect x="942" y="180" width="20" height="96" rx="3" fill="#16202A" stroke="#2A3641"/>
    <rect x="1022" y="120" width="20" height="156" rx="3" fill="#4FD1A5"/>
    <rect x="1102" y="150" width="20" height="126" rx="3" fill="#16202A" stroke="#2A3641"/>
    <line x1="918" y1="276.5" x2="1146" y2="276.5" stroke="#2A3641" stroke-width="1.5"/>
    <path d="M1028 107v-3a4 4 0 0 1 8 0v3" fill="none" stroke="#4FD1A5" stroke-width="2.4"/>
    <rect x="1025" y="107" width="14" height="10" rx="2.5" fill="#4FD1A5"/>
    <text x="952" y="304" fill="#8B98A5">RULES</text>
    <text x="1032" y="304" fill="#4FD1A5" font-weight="600">LOCAL</text>
    <text x="1112" y="304" fill="#8B98A5">BEDROCK</text>
